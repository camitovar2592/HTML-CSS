<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&family=Macondo+Swash+Caps&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="header">
        <nav class="menu">
            <img src="topvar.png" alt="logo" class="logo">
            <ul class="menu__list">
                <li class="menu__item">HOME</li>
                <li class="menu__item">PRODUCTS</li>
                <li class="menu__item">SERVICES</li>
                <li class="menu__item">ABOUT US</li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="borde"></div>
        <section class="hero">
            <h1>OMAR CAMILO TOVAR BARRERO</h1>
            <p class="hero__slogan">"Nada sucede hasta que algo se mueve. Albert Einstein"</p>
            <button class="hero__btn">About me</button>
        </section>

        <section class="container">
            <div class="card">
                <img src="arvind-vallabh-kjk90_OSGZU-unsplash.jpg" alt="plataforma off shore" class="card__image">
                <h2 class="card__name">Estudios Academicos</h2>
                <div class="button">
                    <button class="card__btn">Explore</button>
                </div>
            </div>

            <div class="card">
                <img src="jessica-rockowitz-5NLCaz2wJXE-unsplash.jpg" alt="Foto Familia" class="card__image">
                <h2 class="card__name">Familia</h2>
                <div class="button">
                    <button class="card__btn">Explore</button>
                </div>
            </div>

            <div class="card">
                <img src="daniel-korpai-pKRNxEguRgM-unsplash.jpg" alt="Proyectos" class="card__image">
                <h2 class="card__name">Proyectos</h2>
                <div class="button">
                    <button class="card__btn">Explore</button>
                </div>
            </div>

        </section>

    </main>

    <footer>
        <section class="foot">
            <div class="footer__redes">
                <img src="github.png" alt="Git hub" class="icon">
                <img src="instagram.png" alt="Git hub" class="icon">
                <img src="logotipo-de-linkedin.png" alt="Git hub" class="icon">
            </div>
            <p class="fin__pagina">"Mis pasos en esta calleresuenan en otra calledonde oigo mis pasos pasaren esta
                calledonde sólo es real la niebla".</p>
        </section>

    </footer>

</body>

</html>
